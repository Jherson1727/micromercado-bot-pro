    - data:
        code: "function main({json_crudo}) {\n    // 1. El escudo protector: Si no\
          \ llega nada o la base de datos no encontró el producto\n    if (!json_crudo\
          \ || json_crudo === \"{}\" || json_crudo === \"[]\" || json_crudo.trim()\
          \ === \"\") {\n        return { mensaje_final: \"Lo siento, no contamos\
          \ con ese producto en el inventario. ¿Hay algo más con lo que te pueda ayudar?\"\
          \ };\n    }\n\n    try {\n        let p = JSON.parse(json_crudo);\n    \
          \    \n        // 2. Si la base de datos nos manda una lista (Array), sacamos\
          \ el primer producto\n        if (Array.isArray(p) && p.length > 0) {\n\
          \            p = p[0];\n        }\n\n        // 3. Verificamos que el producto\
          \ realmente tenga un nombre\n        if (!p || !p.nombre) {\n          \
          \  return { mensaje_final: \"Lo siento, no contamos con ese producto en\
          \ el inventario. ¿Hay algo más con lo que te pueda ayudar?\" };\n      \
          \  }\n\n        // 4. Validación de stock agotado (El nuevo escudo de seguridad)\n\
          \        if (p.stock_actual <= 0) {\n            return { \n           \
          \     mensaje_final: `Lo siento, el producto ${p.nombre} se encuentra temporalmente\
          \ agotado. ¿Deseas consultar otro artículo?` \n            };\n        }\n\
          \n        // 5. Armamos el mensaje exitoso\n        let texto = `¡Hola!\
          \ En el inventario de Preciazo tenemos actualmente ${p.stock_actual} unidades\
          \ de ${p.nombre} a un precio de ${p.precio_venta}Bs. ¿Te registro algún\
          \ pedido?`;\n        \n        return { mensaje_final: texto };\n      \
          \  \n    } catch (e) {\n        // Si hay un error de lectura, usamos la\
          \ respuesta por defecto\n        return { mensaje_final: \"Lo siento, no\
          \ contamos con ese producto en el inventario. ¿Hay algo más con lo que te\
          \ pueda ayudar?\" };\n    }\n}"
        code_language: javascript
