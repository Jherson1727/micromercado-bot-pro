    - data:
        code: "function main({datos_producto, cantidad}) {\n    let cant = parseFloat(cantidad)\
          \ || 1;\n\n    // 1. Control si la base de datos no encontró nada\n    if\
          \ (!datos_producto || datos_producto === \"{}\" || datos_producto.trim()\
          \ === \"\") {\n        return {\n            id_producto: \"0\",\n     \
          \       nombre: \"Producto no encontrado\",\n            precio_unitario:\
          \ \"0.00\",\n            cantidad: String(cant),\n            total_bs:\
          \ \"0.00\"\n        };\n    }\n\n    try {\n        let producto = JSON.parse(datos_producto);\n\
          \        \n        // 2. Control si el JSON viene con errores\n        if\
          \ (!producto.nombre) {\n            return {\n                id_producto:\
          \ \"0\",\n                nombre: \"Producto no especificado\",\n      \
          \          precio_unitario: \"0.00\",\n                cantidad: String(cant),\n\
          \                total_bs: \"0.00\"\n            };\n        }\n\n     \
          \   // 3. Cálculos matemáticos \n        let precio = parseFloat(producto.precio_venta)\
          \ || 0;\n        let total = (precio * cant).toFixed(2);\n\n     \n    \
          \    return {\n            id_producto: String(producto.id || 0),\n    \
          \        nombre: producto.nombre,\n            precio_unitario: precio.toFixed(2),\n\
          \            cantidad: String(cant),\n            total_bs: total\n    \
          \    };\n        \n    } catch (e) {\n        // 4. Control si el texto\
          \ no es un JSON válido\n        return {\n            id_producto: \"0\"\
          ,\n            nombre: \"Error de formato\",\n            precio_unitario:\
          \ \"0.00\",\n            cantidad: String(cant),\n            total_bs:\
          \ \"0.00\"\n        };\n    }\n}"
